<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HouseTables — Texas Hold'em</title>
<link rel="stylesheet" href="assets/casino.css" />
<style>
  html,body{height:100%;overflow:hidden;}
  #root{height:100vh;}
  .table-wrap{height:100vh;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;z-index:30;
    background:linear-gradient(180deg, rgba(11,10,7,.95), rgba(11,10,7,.2));}
  .back{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--cream-dim);font-family:var(--fs-head);
    font-size:13px;letter-spacing:.12em;text-transform:uppercase;padding:9px 16px;border-radius:999px;border:1px solid rgba(217,182,90,.25);transition:.2s;}
  .back:hover{color:var(--gold-l);border-color:var(--gold);}
  .title-c{text-align:center;}
  .title-c .t{font-family:var(--fs-display);font-weight:900;font-size:20px;letter-spacing:.14em;}
  .title-c .s{font-family:var(--fs-head);font-size:9px;letter-spacing:.4em;color:var(--cream-faint);}
  .topbar .right{display:flex;align-items:center;gap:12px;}

  .felt-stage{flex:1;position:relative;margin:44px 30px 22px;min-height:0;}
  .table-oval{position:absolute;inset:4% 3%;border-radius:46% / 50%;
    border:1px solid rgba(217,182,90,.3);box-shadow:var(--shadow-pop);}
  .table-oval::after{content:"";position:absolute;inset:20px;border-radius:46% / 50%;border:2px solid rgba(217,182,90,.16);}

  .dealer-plaque{position:absolute;top:50%;left:50%;transform:translate(-50%,calc(-50% - 118px));text-align:center;
    font-family:var(--fs-head);letter-spacing:.28em;font-size:9px;color:var(--cream-faint);text-transform:uppercase;z-index:3;}
  .dealer-plaque .croupier{width:52px;height:52px;border-radius:50%;margin:0 auto 6px;
    background:linear-gradient(160deg,#2a1f12,#140e08);border:1px solid rgba(217,182,90,.45);
    display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 6px 16px rgba(0,0,0,.5), inset 0 1px 0 rgba(243,221,150,.2);position:relative;}
  .dealer-plaque .croupier .bowtie{position:absolute;bottom:7px;font-size:11px;}
  .dealer-plaque.dealing .croupier{animation:pulseGold 1s ease infinite;}

  /* center: pot + community */
  .center-area{position:absolute;top:50%;left:50%;transform:translate(-50%,calc(-50% + 22px));display:flex;flex-direction:column;align-items:center;gap:12px;z-index:4;}
  .pot{display:inline-flex;align-items:center;gap:9px;padding:7px 18px;border-radius:999px;background:rgba(0,0,0,.5);
    border:1px solid rgba(217,182,90,.4);font-family:var(--fs-head);font-weight:700;}
  .pot .coin{width:18px;height:18px;border-radius:50%;background:var(--gold-grad);box-shadow:inset 0 1px 0 rgba(255,255,255,.5);}
  .pot .v{color:var(--gold-l);font-size:16px;}
  .pot .lbl{font-size:9px;letter-spacing:.2em;color:var(--cream-faint);text-transform:uppercase;}
  .board{display:flex;gap:7px;min-height:96px;align-items:center;}
  .board .card{--w:66px;animation:dealIn .45s cubic-bezier(.2,.9,.25,1) backwards;}
  .board .slot{width:66px;height:94px;border-radius:8px;border:1px dashed rgba(217,182,90,.16);}

  /* seats */
  .seat{position:absolute;width:178px;transform:translate(-50%,-50%);z-index:5;}
  .seat .pod{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:14px;
    background:linear-gradient(180deg, rgba(27,24,16,.96), rgba(11,10,7,.96));border:1px solid rgba(217,182,90,.28);
    box-shadow:0 8px 22px rgba(0,0,0,.5);position:relative;transition:.2s;}
  .seat.active .pod{border-color:var(--gold-l);box-shadow:0 0 0 2px rgba(217,182,90,.55), 0 10px 26px rgba(0,0,0,.5);}
  .seat.folded .pod{opacity:.4;filter:grayscale(.7);}
  .seat .av{width:42px;height:42px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
    font-family:var(--fs-head);font-weight:800;font-size:18px;color:#2a1f08;background:var(--gold-grad);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.5);position:relative;}
  .seat.bot .av{background:linear-gradient(160deg,#3a3327,#221d12);color:var(--gold-l);border:1px solid rgba(217,182,90,.4);}
  .seat.empty .av{background:rgba(217,182,90,.08);color:var(--cream-faint);border:1px dashed rgba(217,182,90,.35);}
  .seat .meta{min-width:0;flex:1;}
  .seat .nm{font-family:var(--fs-head);font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--cream);}
  .seat .st{font-size:12px;color:var(--gold-l);font-variant-numeric:tabular-nums;font-weight:600;}
  .seat .tag{position:absolute;top:-9px;right:10px;font-size:8px;letter-spacing:.14em;text-transform:uppercase;
    background:rgba(217,182,90,.18);border:1px solid rgba(217,182,90,.4);color:var(--gold-l);padding:2px 6px;border-radius:6px;}
  .seat .lastact{position:absolute;bottom:-10px;left:50%;transform:translate(-50%,100%);font-size:10px;letter-spacing:.06em;
    color:var(--cream-dim);background:rgba(0,0,0,.55);padding:2px 9px;border-radius:6px;white-space:nowrap;border:1px solid rgba(217,182,90,.2);z-index:6;}
  .dealer-btn{position:absolute;width:25px;height:25px;border-radius:50%;background:var(--ivory);color:#1a130a;
    font-family:var(--fs-head);font-weight:800;font-size:11px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 3px 8px rgba(0,0,0,.5);z-index:7;border:1px solid var(--gold-d);}

  .holes{display:flex;gap:4px;justify-content:center;margin-bottom:8px;}
  .holes .card{--w:46px;animation:dealIn .4s cubic-bezier(.2,.9,.25,1) backwards;}
  .seat.you .holes .card{--w:60px;}
  .seat .betchip{position:absolute;display:flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;
    background:rgba(0,0,0,.62);border:1px solid rgba(217,182,90,.45);font-size:11px;font-weight:700;color:var(--gold-l);white-space:nowrap;z-index:6;}
  .seat .betchip .dot{width:11px;height:11px;border-radius:50%;background:var(--gold-grad);flex:0 0 auto;box-shadow:inset 0 1px 0 rgba(255,255,255,.5);}
  .seat.winner .pod{border-color:var(--gold-l);box-shadow:0 0 0 2px var(--gold), 0 0 32px rgba(217,182,90,.65);}
  .rank-pill{position:absolute;left:50%;transform:translateX(-50%);top:-12px;font-size:9px;letter-spacing:.06em;
    background:var(--gold-grad);color:#2a1f08;font-weight:800;padding:2px 8px;border-radius:6px;white-space:nowrap;z-index:8;text-transform:uppercase;}

  /* control bar */
  .control-bar{padding:14px 24px 18px;min-height:116px;display:flex;align-items:center;justify-content:center;gap:20px;z-index:20;
    border-top:1px solid rgba(217,182,90,.16);background:linear-gradient(0deg, rgba(11,10,7,.7), transparent);}
  .actions{display:flex;gap:12px;align-items:center;}
  .actions .btn{min-width:122px;}
  .raise-box{display:flex;flex-direction:column;gap:9px;align-items:stretch;width:300px;}
  .raise-top{display:flex;align-items:center;gap:12px;}
  .raise-top input[type=range]{flex:1;accent-color:var(--gold);height:5px;}
  .raise-amt{font-family:var(--fs-head);font-weight:800;color:var(--gold-l);min-width:84px;text-align:right;font-variant-numeric:tabular-nums;font-size:16px;}
  .quick{display:flex;gap:7px;}
  .quick button{flex:1;font-family:var(--fs-head);font-size:11px;letter-spacing:.05em;text-transform:uppercase;
    padding:7px 0;border-radius:8px;background:rgba(217,182,90,.1);border:1px solid rgba(217,182,90,.3);color:var(--gold-l);cursor:pointer;transition:.15s;}
  .quick button:hover{background:rgba(217,182,90,.22);}
  .waitmsg{font-family:var(--fs-head);letter-spacing:.08em;color:var(--cream-dim);font-size:14px;display:flex;align-items:center;gap:10px;}
  .waitmsg .spin{width:14px;height:14px;border:2px solid rgba(217,182,90,.3);border-top-color:var(--gold);border-radius:50%;animation:spin360 .8s linear infinite;}
  @keyframes spin360{to{transform:rotate(360deg);}}

  /* invite modal */
  .modal-bg{position:fixed;inset:0;background:rgba(5,4,2,.72);backdrop-filter:blur(5px);z-index:100;display:flex;align-items:center;justify-content:center;animation:floatUp .2s;}
  .modal{width:460px;max-width:92vw;padding:32px;border-radius:var(--radius-lg);position:relative;}
  .modal h2{font-family:var(--fs-head);font-weight:700;font-size:24px;margin:0 0 6px;}
  .modal p{color:var(--cream-dim);font-size:14px;line-height:1.55;margin:0 0 20px;}
  .invite-field{display:flex;gap:10px;}
  .invite-field input{flex:1;background:rgba(0,0,0,.4);border:1px solid rgba(217,182,90,.3);border-radius:10px;padding:0 14px;color:var(--gold-l);font-size:13px;height:46px;}
  .invite-field input:focus{outline:none;border-color:var(--gold);}
  .modal .x{position:absolute;top:16px;right:18px;background:none;border:none;color:var(--cream-faint);font-size:24px;cursor:pointer;line-height:1;}
  .modal .x:hover{color:var(--gold-l);}
  .roomrow{display:flex;align-items:center;gap:12px;margin-top:16px;padding:11px 16px;border-radius:10px;background:rgba(0,0,0,.35);border:1px dashed rgba(217,182,90,.4);}
  .roomrow .k{font-size:10px;letter-spacing:.2em;color:var(--cream-faint);text-transform:uppercase;}
  .roomrow .v{font-family:var(--fs-head);font-weight:700;letter-spacing:.3em;color:var(--gold-l);font-size:19px;}
  .seatnote{margin-top:18px;font-size:12px;color:var(--cream-faint);line-height:1.5;border-top:1px solid rgba(217,182,90,.15);padding-top:14px;}

  .result-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,calc(-50% - 96px));z-index:9;text-align:center;
    font-family:var(--fs-display);font-weight:900;font-size:22px;padding:12px 30px;border-radius:14px;animation:floatUp .35s;
    background:var(--gold-grad);color:#2a1f08;box-shadow:0 18px 50px rgba(0,0,0,.6);max-width:76%;}

  @media(max-width:900px){
    .seat{width:150px;}
    .seat .holes .card{--w:38px;}
    .seat.you .holes .card{--w:52px;}
    .board .card{--w:52px;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="assets/bank.js"></script>
<script src="assets/poker-engine.js"></script>
<script src="assets/poker-game.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const SEATS = [
  { name:'You', avatar:'V' },
  { name:'Marcel', avatar:'M' },
  { name:'Bianca', avatar:'B' },
  { name:'Saxon', avatar:'S' },
  { name:'Odette', avatar:'O' },
  { name:'Dmitri', avatar:'D' },
];
// seat anchors (% of stage) + bet-chip offset toward center
const POS = [
  { x:50, y:91, bx:0,   by:-72 },  // 0 you bottom
  { x:87, y:65, bx:-70, by:-2 },   // 1 right lower
  { x:83, y:19, bx:-62, by:18 },   // 2 right upper
  { x:50, y:7,  bx:0,   by:66 },   // 3 top
  { x:17, y:19, bx:62,  by:18 },   // 4 left upper
  { x:13, y:65, bx:70,  by:-2 },   // 5 left lower
];
const sleep = ms => new Promise(r=>setTimeout(r,ms));

function Card({ card, faceDown, idx=0, cls='' }){
  const style = { animationDelay:(idx*0.07)+'s' };
  if (faceDown || !card) return <div className={"card back "+cls} style={style}></div>;
  return (
    <div className={"card "+(card.color==='red'?'red ':'')+cls} style={style}>
      <div className="pip-tl"><div className="rank">{card.rank}</div><div className="pip-suit">{card.suit}</div></div>
      <div className="center-suit">{card.suit}</div>
      <div className="pip-br"><div className="rank">{card.rank}</div><div className="pip-suit">{card.suit}</div></div>
    </div>
  );
}

function Seat({ p, pos, game, snap, isButton }){
  const active = snap.toAct === p.id && (snap.street!=='handover'&&snap.street!=='idle'&&snap.street!=='showdown');
  const isWinner = snap.lastResult && snap.lastResult.winners.indexOf(p.id) >= 0 && (snap.street==='handover');
  const showCards = snap.lastResult && snap.lastResult.showdown && !p.folded;
  const reveal = p.isYou || showCards;
  const handName = snap.lastResult && snap.lastResult.showdown && snap.lastResult.hands[p.id] && !p.folded ? snap.lastResult.hands[p.id].name : null;
  const cls = 'seat'+(p.isYou?' you':'')+(p.isBot?' bot':'')+(p.folded?' folded':'')+(active?' active':'')+(isWinner?' winner':'');
  const hasHole = p.hole && p.hole.length===2 && !p.sittingOut;

  return (
    <div className={cls} style={{ left:pos.x+'%', top:pos.y+'%' }}>
      {hasHole && handName && <div className="rank-pill">{handName}</div>}
      {hasHole && (
        <div className="holes">
          <Card card={p.hole[0]} faceDown={!reveal} idx={0} />
          <Card card={p.hole[1]} faceDown={!reveal} idx={1} />
        </div>
      )}
      <div className="pod">
        {p.isYou ? null : <span className="tag">{p.isBot?'House':'Guest'}</span>}
        <div className="av">{p.avatar}{isButton && <div className="dealer-btn" style={{bottom:-6,right:-6}}>D</div>}</div>
        <div className="meta">
          <div className="nm">{p.name}</div>
          <div className="st tabnum">{p.sittingOut?'Sitting out':Bank.fmt(p.stack)}</div>
        </div>
        {p.lastAct && <div className="lastact">{p.lastAct}</div>}
      </div>
      {p.bet>0 && (
        <div className="betchip" style={{ left:`calc(50% + ${pos.bx}px)`, top:`calc(50% + ${pos.by}px)`, transform:'translate(-50%,-50%)' }}>
          <span className="dot"></span>{Bank.fmtShort(p.bet)}
        </div>
      )}
    </div>
  );
}

function App(){
  const gameRef = useRef(null);
  if (!gameRef.current) gameRef.current = new PokerGame(SEATS);
  const game = gameRef.current;
  const [snap, setSnap] = useState(()=>game.snapshot());
  const [showInvite, setShowInvite] = useState(false);
  const [raiseTo, setRaiseTo] = useState(0);
  const [dealing, setDealing] = useState(false);
  const balRef = useRef(null);
  const autoNext = useRef(null);

  useEffect(()=>{ if(balRef.current) Bank.mountBalance(balRef.current); },[]);
  const sync = useCallback(()=> setSnap({...game.snapshot()}), [game]);

  // ---- game driver: advances bots automatically, stops on human turn ----
  const drive = useCallback(()=>{
    const g = game;
    if (g.street==='handover' || g.street==='idle' || g.street==='showdown'){ sync(); return; }
    const p = g.players[g.toAct];
    if (!p){ sync(); return; }
    sync();
    if (p.isYou) return; // wait for UI
    // bot acts after a beat
    setTimeout(()=>{
      if (g.players[g.toAct] && !g.players[g.toAct].isYou && g.street!=='handover'){
        const d = g.botDecision();
        const ev = g.apply(d.type, d.amount);
        sync();
        if (ev==='showdown' || ev==='win'){ endHand(); }
        else { drive(); }
      }
    }, 850 + Math.random()*500);
  }, [game, sync]);

  const endHand = useCallback(()=>{
    sync();
    clearTimeout(autoNext.current);
    autoNext.current = setTimeout(()=>{ startHand(); }, 4200);
  }, [sync]);

  const startHand = useCallback(async ()=>{
    clearTimeout(autoNext.current);
    setDealing(true);
    game.startHand();
    sync();
    await sleep(700);
    setDealing(false);
    if (game.street==='idle'){ sync(); return; }
    drive();
  }, [game, sync, drive]);

  // human action
  const act = useCallback((type, amount)=>{
    const g = game;
    if (g.players[g.toAct] && !g.players[g.toAct].isYou) return;
    const ev = g.apply(type, amount);
    sync();
    if (ev==='showdown' || ev==='win'){ endHand(); }
    else { drive(); }
  }, [game, sync, drive, endHand]);

  // set up raise slider default when it becomes your turn
  const youToAct = snap.toAct===0 && !game.players[0].folded && (snap.street==='preflop'||snap.street==='flop'||snap.street==='turn'||snap.street==='river');
  const legal = youToAct ? game.legal() : null;
  useEffect(()=>{
    if (legal && legal.canRaise) setRaiseTo(legal.minRaiseTo);
  }, [snap.toAct, snap.street]);

  // deal first hand on mount
  useEffect(()=>{ const t=setTimeout(()=>startHand(), 500); return ()=>{clearTimeout(t);clearTimeout(autoNext.current);}; }, []);

  const inviteLink = Bank.inviteUrl('Poker.html');
  const room = Bank.getRoom();

  const buttonSeat = snap.button;
  const showResult = snap.street==='handover' && snap.lastResult;

  return (
    <div className="table-wrap">
      <header className="topbar">
        <a className="back" href="index.html">← Lobby</a>
        <div className="title-c"><div className="t gold-text">TEXAS HOLD’EM</div><div className="s">NO-LIMIT · BLINDS 500 / 1,000</div></div>
        <div className="right">
          <button className="btn btn-sm btn-ghost" onClick={()=>setShowInvite(true)}>Invite</button>
          <div ref={balRef}></div>
        </div>
      </header>

      <div className="felt-stage">
        <div className="table-oval felt felt-red"></div>

        <div className={"dealer-plaque"+(dealing?' dealing':'')}>
          <div className="croupier">🤵<span className="bowtie">🎀</span></div>
          Dealer
        </div>

        <div className="center-area">
          {snap.pot>0 && <div className="pot"><span className="coin"></span><span className="lbl">Pot</span><span className="v tabnum">{Bank.fmt(snap.pot)}</span></div>}
          <div className="board">
            {[0,1,2,3,4].map(i=>(
              snap.community[i]
                ? <Card key={i} card={snap.community[i]} idx={i} />
                : <div key={i} className="slot"></div>
            ))}
          </div>
        </div>

        {showResult && <div className="result-banner">{snap.message}</div>}

        {game.players.map((p,i)=>(
          <Seat key={i} p={p} pos={POS[i]} game={game} snap={snap} isButton={i===buttonSeat} />
        ))}
      </div>

      <div className="control-bar">
        {snap.street==='idle' && (
          <div className="actions" style={{flexDirection:'column'}}>
            <div className="waitmsg" style={{marginBottom:6}}>{snap.message||'Table paused'}</div>
            <button className="btn" onClick={()=>{ if(Bank.getBalance()<PokerGame.BB){Bank.setBalance(Bank.START);Bank.toast('Topped up','win');} startHand(); }}>
              {Bank.getBalance()<PokerGame.BB?'Refill & Deal':'Deal In'}
            </button>
          </div>
        )}

        {youToAct && legal && (
          <>
            <div className="actions">
              <button className="btn btn-danger" onClick={()=>act('fold')}>Fold</button>
              {legal.canCheck
                ? <button className="btn btn-ghost" onClick={()=>act('check')}>Check</button>
                : <button className="btn btn-ghost" onClick={()=>act('call')}>Call {Bank.fmtShort(legal.toCall)}</button>}
            </div>
            {legal.canRaise && (
              <div className="raise-box">
                <div className="raise-top">
                  <input type="range" min={legal.minRaiseTo} max={legal.maxRaiseTo} step={PokerGame.BB}
                    value={Math.min(Math.max(raiseTo,legal.minRaiseTo),legal.maxRaiseTo)}
                    onChange={e=>setRaiseTo(parseInt(e.target.value,10))} />
                  <span className="raise-amt">{Bank.fmt(Math.min(Math.max(raiseTo,legal.minRaiseTo),legal.maxRaiseTo))}</span>
                </div>
                <div className="quick">
                  <button onClick={()=>setRaiseTo(Math.min(legal.maxRaiseTo, Math.max(legal.minRaiseTo, Math.round((legal.pot*0.5)/PokerGame.BB)*PokerGame.BB + (legal.toCall))))}>½ Pot</button>
                  <button onClick={()=>setRaiseTo(Math.min(legal.maxRaiseTo, Math.max(legal.minRaiseTo, Math.round((legal.pot)/PokerGame.BB)*PokerGame.BB + legal.toCall)))}>Pot</button>
                  <button onClick={()=>setRaiseTo(legal.maxRaiseTo)}>All-in</button>
                </div>
              </div>
            )}
            {legal.canRaise && (
              <div className="actions">
                <button className="btn" onClick={()=>act(raiseTo>=legal.maxRaiseTo?'allin':'raise', raiseTo)}>
                  {legal.canCheck && legal.toCall===0 ? 'Bet' : 'Raise to'} {Bank.fmtShort(Math.min(Math.max(raiseTo,legal.minRaiseTo),legal.maxRaiseTo))}
                </button>
              </div>
            )}
          </>
        )}

        {!youToAct && snap.street!=='idle' && !showResult && (
          <div className="waitmsg"><span className="spin"></span>{dealing?'Dealing…':(game.players[snap.toAct]? game.players[snap.toAct].name+' is deciding…':'…')}</div>
        )}

        {showResult && (
          <div className="actions" style={{flexDirection:'column'}}>
            <div className="waitmsg" style={{marginBottom:4}}>{snap.message}</div>
            <button className="btn" onClick={()=>startHand()}>Next Hand →</button>
          </div>
        )}
      </div>

      {showInvite && (
        <div className="modal-bg" onClick={()=>setShowInvite(false)}>
          <div className="modal gilt" onClick={e=>e.stopPropagation()}>
            <button className="x" onClick={()=>setShowInvite(false)}>×</button>
            <h2 className="gold-text">Invite to your table</h2>
            <p>Share this link and friends drop into an open seat. Empty seats are played by the house until your guests arrive — wire the room code to your backend to seat real players.</p>
            <div className="invite-field">
              <input readOnly value={inviteLink} />
              <button className="btn" onClick={()=>{navigator.clipboard.writeText(inviteLink).then(()=>Bank.toast('Invite link copied','win'));}}>Copy</button>
            </div>
            <div className="roomrow">
              <span className="k">Room</span>
              <span className="v">{room}</span>
              <button className="btn btn-sm btn-ghost" style={{marginLeft:'auto'}} onClick={()=>{localStorage.setItem('gilded_room_v1',Bank.makeCode());setShowInvite(false);setTimeout(()=>setShowInvite(true),60);}}>New room</button>
            </div>
            <div className="seatnote">Blinds 500 / 1,000 · No-limit · 6 seats. Your chips carry across every HouseTables table.</div>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
